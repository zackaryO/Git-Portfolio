<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BigToa - README</title>
<link rel="stylesheet" href="../../style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="doc-page">
<nav class="site-header">
  <a class="nav-brand" href="../../index.html">
    <span class="nav-brand-mark">ZO</span>
    <span class="nav-brand-text">Zack Otterstrom</span>
  </a>
  <div class="nav-links">
    <a href="../../index.html#projects">Projects</a>
    <a href="../../index.html#contact">Contact</a>
  </div>
</nav>

<main class="doc-shell">
  <header class="doc-header">
    <div class="doc-crumb"><a href="../../index.html#projects">Projects</a> <span>/</span> <a href="../../index.html#projects">BigToa</a> <span>/</span> README.md</div>
    <h1 class="doc-title">BigToa: README</h1>
    <p class="doc-sub">Production at <a href="https://bigtoa.com" target="_blank" rel="noopener">bigtoa.com</a> &middot; Source code private</p>
    <div class="doc-actions">
      <a class="btn-ghost" href="../../index.html#projects">&larr; Back to portfolio</a>
      <a class="btn-ghost" href="security.html">View SECURITY.md &rarr;</a>
    </div>
  </header>
  <article id="doc-content" class="doc-content"></article>
</main>

<footer class="site-footer">
  <p>&copy; 2026 Zack Otterstrom</p>
</footer>

<script>
(async () => {
  const target = document.getElementById('doc-content');
  try {
    const res = await fetch('README.md', { cache: 'no-store' });
    if (!res.ok) throw new Error(res.statusText);
    const md = await res.text();
    marked.setOptions({ breaks: false, gfm: true });
    target.innerHTML = marked.parse(md);
  } catch (err) {
    target.innerHTML = '<p class="doc-error">Could not load README.md (' + err.message + '). When opening this page directly from disk, your browser may block the fetch; load the portfolio over a local server (e.g. <code>npx serve</code>) or via GitHub Pages.</p>';
  }
})();
</script>
</body>
</html>
